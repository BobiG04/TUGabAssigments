<!DOCTYPE html>
<html lang="bg" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src * data: blob: ws: wss: gap://ready file://*; style-src * 'unsafe-inline'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * ws: wss:;">
    <script src="components/loader.js"></script>
    <title>Игра Бесеница</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <style>
        .word-display {
            font-size: 2.5rem;
            letter-spacing: 0.5rem;
        }
    </style>

</head>

<body>

    <div class="container mt-5 text-center">
        <div class="d-flex justify-content-end mb-3 game-wrapper">
    <button id="theme-toggle" class="btn btn-dark">🌙 Dark Mode</button>
</div>

        <div class="card shadow p-4 mx-auto game-wrapper">
            <h1 class="mb-4">Бесеница</h1>

            <div class="row mb-4">
                <div class="col-md-4 mb-2">
                    <select id="language-select" class="form-select" title="Избор на език" aria-label="Избор на език">
                        <option value="bg">Български</option>
                        <option value="en">English</option>
                    </select>
                </div>
                <div class="col-md-4 mb-2">
                    <select id="difficulty-select" class="form-select" title="Избор на трудност"
                        aria-label="Избор на трудност">
                        <option value="easy">Лесно (3-5 букви)</option>
                        <option value="medium">Средно (6-8 букви)</option>
                        <option value="hard">Трудно (9+ букви)</option>
                    </select>
                </div>
                <div class="col-md-4 mb-2">
                    <select id="category-select" class="form-select" title="Избор на категория"
                        aria-label="Избор на категория">
                        <option value="all">Всички теми</option>
                        <option value="it">ИТ и Технологии</option>
                        <option value="geography">География</option>
                        <option value="animals">Животни</option>
                    </select>
                </div>
            </div>

            <div class="mb-4">
                <img id="meme-image" src="https://placehold.co/300x200/0099ff/ffffff?text=Спокоен+старт...+6+Живота"
    alt="Meme" class="img-fluid rounded shadow">
            </div>

            <div class="text-center my-3">
                <h2 id="wordDisplay" class="letter-spacing-lg fw-bold text-primary">_ _ _ _ _</h2>
            </div>

            <div class="text-center mb-3">
                <p class="text-muted mb-1 used-letters-label">Използвани букви:</p>
                <div id="usedLettersDisplay" class="fw-bold text-secondary"></div>
            </div>



            <h4 class="mb-4">Останали животи: <span id="lives-display" class="text-danger fw-bold">6</span></h4>

            <div class="input-group mb-3 justify-content-center input-wrapper">
    <input type="text" id="guessInput" class="form-control text-center fw-bold" maxlength="1"
        placeholder="Буква" autocomplete="off" title="Въвеждане на буква" aria-label="Въвеждане на буква">
    <button id="guessBtn" class="btn btn-primary">Провери</button>
</div>

            <div id="message" class="alert d-none" role="alert"></div>

            <button class="btn btn-success mt-3 d-none" id="restart-btn">Нова игра</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
